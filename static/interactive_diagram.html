<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive product diagram</title>
  <style>
    :root {
      --bg: #fafafa;
      --panel: #fff;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.15);
      --text: #111827;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    header h1 { font-size: 1.35rem; margin: 0 0 0.25rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .hint {
      margin: 1rem 0;
      padding: 0.65rem 0.85rem;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr minmax(260px, 320px);
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
    .diagram-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .diagram-title {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.95rem;
    }
    .diagram-stage {
      position: relative;
      background: #f3f4f6;
      line-height: 0;
    }
    .diagram-stage img {
      width: 100%;
      height: auto;
      display: block;
      vertical-align: top;
    }
    .hotspot-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .hotspot {
      position: absolute;
      pointer-events: auto;
      border: 2px solid transparent;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }
    .hotspot:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .hotspot:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .hotspot.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .hotspot.circle { border-radius: 50%; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      min-height: 200px;
    }
    .panel h2 {
      font-size: 1rem;
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    .panel .placeholder { color: var(--muted); font-size: 0.95rem; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .badge.yes { background: #dcfce7; color: #166534; }
    .badge.no { background: #fee2e2; color: #991b1b; }
    .sel-code { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .sel-desc { margin-top: 0.35rem; }
    .err {
      padding: 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #991b1b;
    }
    .bom {
      margin-top: 1.25rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }
    .bom h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
    .bom table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .bom th, .bom td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); }
    .bom tr:last-child td { border-bottom: none; }
    .bom button.link {
      background: none; border: none; padding: 0; color: var(--accent);
      cursor: pointer; text-decoration: underline; font: inherit;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="title">Interactive diagram</h1>
      <p id="subtitle">Loading…</p>
    </header>
    <p class="hint" id="hint">
      Click a highlighted region on the diagram to see what that part does and whether it can be ordered.
      You can also pick a row from the parts list below.
    </p>
    <div id="error" class="err" style="display:none;"></div>
    <div class="layout" id="main" style="display:none;">
      <div class="diagram-card">
        <div class="diagram-title" id="diagramTitle">Diagram</div>
        <div class="diagram-stage" id="stage">
          <img id="diagramImg" alt="" />
          <div class="hotspot-layer" id="hotspotLayer" aria-hidden="true"></div>
        </div>
      </div>
      <aside class="panel" aria-live="polite">
        <h2>Selected part</h2>
        <div id="panelBody" class="placeholder">Click the diagram or a part in the list.</div>
      </aside>
    </div>
    <section class="bom" id="bomSection" style="display:none;">
      <h3>Parts list</h3>
      <table id="bomTable"><thead><tr><th>Code</th><th>Description</th><th>Orderable</th></tr></thead><tbody></tbody></table>
    </section>
  </div>
  <script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const categorySlug = params.get("category") || "metal-blinds";
  const productSlug = params.get("product") || "standard-metal-blind";
  const locale = params.get("locale") || "en";

  const titleEl = document.getElementById("title");
  const subtitleEl = document.getElementById("subtitle");
  const errorEl = document.getElementById("error");
  const mainEl = document.getElementById("main");
  const diagramTitleEl = document.getElementById("diagramTitle");
  const diagramImg = document.getElementById("diagramImg");
  const hotspotLayer = document.getElementById("hotspotLayer");
  const panelBody = document.getElementById("panelBody");
  const bomSection = document.getElementById("bomSection");
  const bomTable = document.querySelector("#bomTable tbody");

  const base = window.location.origin;
  const detailUrl = base + "/api/v1/categories/" + encodeURIComponent(categorySlug) + "/products/" + encodeURIComponent(productSlug) + "?locale=" + encodeURIComponent(locale);

  function showError(msg) {
    errorEl.style.display = "block";
    errorEl.textContent = msg;
    subtitleEl.textContent = "";
  }

  function rectStyle(g) {
    return {
      left: g.x + "%",
      top: g.y + "%",
      width: g.width + "%",
      height: g.height + "%",
    };
  }

  function circleStyle(g) {
    const d = (g.r || 0) * 2;
    return {
      left: (g.cx - g.r) + "%",
      top: (g.cy - g.r) + "%",
      width: d + "%",
      height: d + "%",
    };
  }

  let hotspots = [];
  let selectedId = null;

  function setSelected(partId) {
    selectedId = partId;
    hotspotLayer.querySelectorAll(".hotspot").forEach(function (el) {
      el.classList.toggle("selected", el.dataset.partId === partId);
    });
    const h = hotspots.find(function (x) { return x.part_id === partId; });
    if (!h) {
      panelBody.className = "placeholder";
      panelBody.textContent = "Click the diagram or a part in the list.";
      return;
    }
    panelBody.className = "";
    panelBody.innerHTML = "";
    const badge = document.createElement("div");
    badge.className = "badge " + (h.is_orderable ? "yes" : "no");
    badge.textContent = h.is_orderable ? "Orderable" : "Not orderable";
    const code = document.createElement("div");
    code.className = "sel-code";
    code.textContent = h.public_code;
    const desc = document.createElement("div");
    desc.className = "sel-desc";
    desc.textContent = h.public_description;
    panelBody.appendChild(badge);
    panelBody.appendChild(code);
    panelBody.appendChild(desc);
  }

  function renderHotspots(list) {
    hotspotLayer.innerHTML = "";
    list
      .slice()
      .sort(function (a, b) { return a.z_order - b.z_order; })
      .forEach(function (h) {
        const g = h.geometry || {};
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "hotspot";
        btn.dataset.partId = h.part_id;
        btn.setAttribute("aria-label", h.public_code + ": " + h.public_description);
        let z = 10 + (h.z_order | 0);
        btn.style.zIndex = String(z);

        if (g.type === "circle" && typeof g.cx === "number") {
          btn.classList.add("circle");
          Object.assign(btn.style, circleStyle(g));
        } else if (g.type === "rect" && typeof g.x === "number") {
          Object.assign(btn.style, rectStyle(g));
        } else {
          return;
        }

        btn.addEventListener("click", function () {
          setSelected(h.part_id);
        });
        hotspotLayer.appendChild(btn);
      });
  }

  function renderBom(lines) {
    bomTable.innerHTML = "";
    lines
      .slice()
      .sort(function (a, b) { return a.sort_order - b.sort_order; })
      .forEach(function (row) {
        const tr = document.createElement("tr");
        const orderTxt = row.is_orderable ? "Yes" : "No";
        tr.innerHTML = "<td><button type='button' class='link' data-part-id='" + row.part_id + "'></button></td><td></td><td>" + orderTxt + "</td>";
        tr.querySelector("button").textContent = row.public_code;
        tr.querySelector("td:nth-child(2)").textContent = row.public_description;
        tr.querySelector("button").addEventListener("click", function () {
          setSelected(row.part_id);
        });
        bomTable.appendChild(tr);
      });
  }

  fetch(detailUrl)
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status + ": could not load product (is the API running and data seeded?)");
      return r.json();
    })
    .then(function (data) {
      titleEl.textContent = data.product.name;
      subtitleEl.textContent = data.category.name + " · " + data.product.subtitle;

      const diagram = data.diagram;
      if (!diagram) {
        showError("This product has no diagram in the published snapshot.");
        return;
      }

      const assetPath = diagram.svg_storage_key
        .split("/")
        .map(function (seg) { return encodeURIComponent(seg); })
        .join("/");
      const src = base + "/api/v1/assets/" + assetPath;
      diagramImg.alt = diagram.alt_summary || diagram.diagram_title || "Product diagram";
      diagramTitleEl.textContent = diagram.diagram_title || "Diagram";
      diagramImg.src = src;

      hotspots = data.diagram_hotspots || [];
      mainEl.style.display = "grid";
      renderHotspots(hotspots);
      if (data.bill_of_materials && data.bill_of_materials.length) {
        bomSection.style.display = "block";
        renderBom(data.bill_of_materials);
      }

      diagramImg.onerror = function () {
        showError("Could not load diagram image from the API. Check uploads and asset URL.");
      };
    })
    .catch(function (e) {
      showError(e.message || String(e));
    });
})();
  </script>
</body>
</html>
